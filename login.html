<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean India Login</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Segoe UI, sans-serif;

            background:linear-gradient(
            135deg,
            #1b5e20,
            #4caf50,
            #a5d6a7
            );

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{

            width:400px;

            background:white;

            padding:30px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,.2);

        }

        h1{
            color:#0b5d1e;
        }

        input,select{

            width:100%;

            padding:12px;

            margin-top:10px;

            border-radius:10px;

            border:1px solid #ccc;

            box-sizing:border-box;

        }

        button{

            width:100%;

            padding:12px;

            margin-top:15px;

            background:#0b8f31;

            color:white;

            border:none;

            border-radius:10px;

            font-size:16px;

            cursor:pointer;

        }

        button:hover{
            background:#087526;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>♻ Clean India</h1>

    <h3>Smart Waste Management System</h3>

    <input
    type="text"
    id="username"
    placeholder="Enter Username">

    <input
    type="password"
    id="password"
    placeholder="Enter Password">

    <select id="role">

        <option value="resident">
            Resident
        </option>

        <option value="admin">
            Admin
        </option>

        <option value="collector">
            Collector
        </option>

    </select>

    <button onclick="login()">
        Login
    </button>

</div>

<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let role =
document.getElementById("role").value;


// ADMIN LOGIN

if(role === "admin"){

    if(

    (username === "Amar Patil" &&
    password === "12345678")

    ||

    (username === "Ravi Kumar" &&
    password === "admin123")

    ){

        window.location.href =
        "admin.html";

    }

    else{

        alert(
        "Invalid Admin Username or Password"
        );

    }

}


// COLLECTOR LOGIN

else if(role === "collector"){

    if(

    (username === "Suresh" &&
    password === "collect123")

    ||

    (username === "Mahesh" &&
    password === "pickup123")

    ){

        window.location.href =
        "collector.html";

    }

    else{

        alert(
        "Invalid Collector Username or Password"
        );

    }

}


// RESIDENT LOGIN

else{

    if(

    (username === "Rahul" &&
    password === "user123")

    ||

    (username === "Priya" &&
    password === "resident123")

    ){

        window.location.href =
        "index.html";

    }

    else{

        alert(
        "Invalid Resident Username or Password"
        );

    }

}

}

</script>

</body>
</html>
