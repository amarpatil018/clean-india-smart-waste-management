<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collector Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

🚛 Clean India - Collector Dashboard

</div>

<!-- Collector Stats -->

<div class="dashboard">

<div class="card">

<h1 id="pendingCount">0</h1>

<p>Pending Pickups</p>

</div>

<div class="card">

<h1 id="progressCount">0</h1>

<p>In Progress</p>

</div>

<div class="card">

<h1 id="completedCount">0</h1>

<p>Completed Pickups</p>

</div>

</div>

<!-- Collector Message -->

<div class="ai-box">

<h2>📍 Today's Collection Route</h2>

<p id="routeMessage">

Loading Route...

</p>

</div>

<!-- Active Pickups -->

<div class="left" style="width:95%;margin:20px auto;">

<h1>🚛 Assigned Pickups</h1>

<div id="collectorRequests">

</div>

</div>

<!-- Pickup History -->

<div class="left" style="width:95%;margin:20px auto;">

<h1>✅ Completed Pickup History</h1>

<div id="history">

</div>

</div>

<script src="collector.js"></script>

</body>

</html>
