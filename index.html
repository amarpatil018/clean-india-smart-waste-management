<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean India - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

background:
linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

display:flex;
justify-content:center;
align-items:center;

}

.container{

width:90%;
max-width:1100px;

display:flex;

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:
0 15px 40px rgba(0,0,0,.3);

}

/* LEFT SIDE */

.left{

flex:1;

padding:60px;

background:
linear-gradient(
135deg,
#1b5e20,
#43a047,
#81c784
);

color:white;

display:flex;
flex-direction:column;
justify-content:center;

}

.left h1{

font-size:52px;

margin-bottom:15px;

}

.left h2{

font-size:28px;

margin-bottom:25px;

}

.left p{

font-size:18px;

line-height:1.8;

}

/* RIGHT SIDE */

.right{

flex:1;

padding:60px;

display:flex;
flex-direction:column;
justify-content:center;

}

.right h2{

text-align:center;

color:#1b5e20;

margin-bottom:25px;

font-size:32px;

}

input,
select{

width:100%;

padding:14px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:12px;

font-size:15px;

}

button{

width:100%;

padding:14px;

background:#1b5e20;

color:white;

border:none;

border-radius:12px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#2e7d32;

transform:translateY(-2px);

}

.footer-text{

margin-top:20px;

text-align:center;

color:#666;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>♻ Clean India</h1>

<h2>Smart Waste Management System</h2>

<p>
Thank you for joining us.
</p>

<p>
Together we can create a cleaner,
greener and smarter India.
</p>

</div>

<div class="right">

<h2>Login Portal</h2>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<select id="role">

<option value="resident">
Resident
</option>

<option value="admin">
Admin
</option>

<option value="collector">
Collector
</option>

</select>

<button onclick="login()">
Login
</button>

<div class="footer-text">

Clean India © 2026

</div>

</div>

</div>

<script>

function login(){

let username =
document.getElementById("username").value.trim();

let password =
document.getElementById("password").value.trim();

let role =
document.getElementById("role").value;


// ADMIN LOGIN

if(role === "admin"){

if(

(username === "Amar Patil" &&
password === "12345678")

||

(username === "Ravi Kumar" &&
password === "admin123")

){

window.location.href =
"admin.html";

}
else{

alert(
"Invalid Admin Username or Password"
);

}

}


// COLLECTOR LOGIN

else if(role === "collector"){

if(

(username === "Suresh" &&
password === "collect123")

||

(username === "Mahesh" &&
password === "pickup123")

){

window.location.href =
"collector.html";

}
else{

alert(
"Invalid Collector Username or Password"
);

}

}


// RESIDENT LOGIN

else{

if(

(username === "rahul" &&
password === "user123")

||

(username === "priya" &&
password === "resident123")

){

window.location.href =
"resident.html";

}
else{

alert(
"Invalid Resident Username or Password"
);

}

}

}

</script>

</body>
</html>
