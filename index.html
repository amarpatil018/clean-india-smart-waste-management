<!DOCTYPE html>
<html>
<head>
<title>Clean India</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<h1>♻ Clean India</h1>
</nav>

<div class="hero">

<div class="left">

<h1>Keep India Clean & Green</h1>

<p>
Smart Waste Collection Management System
</p>

<img src="https://www.vecteezy.com/photo/35315564-ai-generated-a-group-of-people-in-green-shirts-standing-around-a-green-recycling-bin-promoting-environmental-awareness-generative-ai"
width="250">

</div>

<div class="right">

<h2>Request Pickup</h2>

<input type="text" id="name"
placeholder="Enter Name">

<input type="text" id="house"
placeholder="House Number">

<input type="text" id="street"
placeholder="Street Name">

<select id="waste">
<option>Wet Waste</option>
<option>Dry Waste</option>
</select>

<button onclick="submitRequest()">
Request Collection
</button>

<p id="message"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
